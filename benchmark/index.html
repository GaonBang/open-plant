<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Open Plant vs deck.gl vs OpenLayers — Point Render Benchmark</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#0a0e14;color:#e0e0e0}
h1{text-align:center;padding:16px;font-size:1.2rem;font-weight:600}
.controls{display:flex;gap:10px;justify-content:center;padding:6px 16px;flex-wrap:wrap}
.controls button{padding:5px 14px;border:1px solid #444;border-radius:6px;background:#1a1e26;color:#e0e0e0;cursor:pointer;font-size:.82rem}
.controls button:hover{background:#2a2e36}
.controls button.active{border-color:#58a6ff;color:#58a6ff}
.controls button:disabled{opacity:.4;cursor:not-allowed}
.bench-row{display:flex;gap:8px;padding:8px 12px;justify-content:center}
.bench-cell{flex:1;max-width:33.3%;position:relative}
.bench-cell h2{font-size:.78rem;text-align:center;padding:3px;background:#12161e;border-radius:6px 6px 0 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
canvas{width:100%;aspect-ratio:4/3;display:block;border-radius:0 0 6px 6px;background:#0d1117}
#log{margin:6px 12px;padding:10px;background:#12161e;border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:.75rem;white-space:pre-wrap;max-height:320px;overflow-y:auto;line-height:1.45}
</style>
</head>
<body>
<h1>Open Plant vs deck.gl vs OpenLayers — Large Point Cloud Benchmark</h1>
<div class="controls" id="count-buttons"></div>
<div class="controls"><label style="font-size:.82rem;cursor:pointer;display:flex;align-items:center;gap:4px"><input type="checkbox" id="cb-ol" checked> Include OpenLayers</label></div>
<div class="bench-row">
  <div class="bench-cell"><h2>Open Plant (gl.POINTS · 1 draw · palette texture)</h2><canvas id="cv-op"></canvas></div>
  <div class="bench-cell"><h2>deck.gl ScatterplotLayer (binary accessor)</h2><canvas id="cv-deck"></canvas></div>
  <div class="bench-cell"><h2>OpenLayers WebGLVectorLayer (RenderFeature)</h2><div id="cv-ol" style="width:100%;aspect-ratio:4/3;border-radius:0 0 6px 6px;background:#0d1117;overflow:hidden"></div></div>
</div>
<div id="log"></div>
<script type="module" src="./main.js"></script>
</body>
</html>
